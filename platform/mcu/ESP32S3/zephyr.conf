CONFIG_POSIX_CLOCK_SELECTION=y
CONFIG_POSIX_THREADS=y
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP14=y
CONFIG_PRINTK=y
CONFIG_PRINTK_SYNC=y
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_XTENSA_RESET_VECTOR=n
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_XTENSA_USE_CORE_CRT1=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y
CONFIG_GEN_ISR_TABLES=y
CONFIG_GEN_IRQ_VECTOR_TABLE=n
CONFIG_CLOCK_CONTROL=y
CONFIG_I2C=y
CONFIG_NEWLIB_LIBC=y
CONFIG_DMA=y
CONFIG_DMA_ESP32=y
CONFIG_HEAP_MEM_POOL_SIZE=32768
# Disable ADC DMA mode - use oneshot mode instead
CONFIG_ADC_ESP32_DMA=n

# Increase system tick rate for precise timer control
# 40 kHz allows exact 8 kHz ADC sampling (125us = 5 ticks)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=40000

# I2S with GDMA for M17 baseband output
CONFIG_I2S=y
CONFIG_I2S_ESP32=y
CONFIG_DMA=y
CONFIG_DMA_ESP32=y

# I2S: Allow 500ms grace period when TX queue is empty before stopping
# This prevents the I2S from stopping between buffer writes
CONFIG_I2S_ESP32_ALLOWED_EMPTY_TX_QUEUE_DEFERRAL_TIME_MS=500
